name: Chart CI
on:
  pull_request:
    paths:
      - 'charts/wazuh/**'
jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Helm
        uses: azure/setup-helm@v3
        with:
          version: v3.12.3
      - name: Lint chart
        run: helm lint charts/wazuh
