image:
  repository: ghcr.io/example/wazuh
  tag: "4.11.1"
  pullPolicy: IfNotPresent
  digest: ""

imagePullSecrets: []

replicaCount: 2
revisionHistoryLimit: 10

serviceAccount:
  create: true
  annotations: {}
  name: ""

podAnnotations: {}
podLabels: {}

service:
  type: ClusterIP
  port: 80
  annotations: {}
  labels: {}

ingress:
  enabled: true
  className: nginx
  annotations: {}
  hosts:
    - host: example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - example.com
      secretName: example-tls

cloud:
  provider: generic
  lbAnnotations: {}

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70
  customMetrics: []

resources:
  requests:
    cpu: "200m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "1Gi"

livenessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 30
  periodSeconds: 10

readinessProbe:
  httpGet:
    path: /
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10

startupProbe:
  httpGet:
    path: /
    port: http
  failureThreshold: 30
  periodSeconds: 5

lifecycle:
  preStop:
    exec:
      command: ["/bin/sh", "-c", "sleep 5"]

terminationGracePeriodSeconds: 30

securityContext:
  runAsNonRoot: true
  runAsUser: 10001
  readOnlyRootFilesystem: true
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  seccompProfile:
    type: RuntimeDefault

podSecurityContext:
  fsGroup: 2000

nodeSelector: {}
tolerations: []
affinity: {}
topologySpreadConstraints: []

networkPolicy:
  enabled: true
  additionalIngress: []
  additionalEgress: []

externalSecrets:
  enabled: false
  backend: ""
  data: []

pdb:
  enabled: true
  minAvailable: 1

monitoring:
  enabled: true
  serviceMonitor:
    interval: 30s
    labels: {}

logging:
  sidecar:
    enabled: false
    image: ghcr.io/fluent/fluent-bit:latest
    resources: {}
    env: []

config:
  configMap: {}
  env: []
  extraEnvFrom: []
  extraVolumes: []
  extraVolumeMounts: []

existingConfigMap: ""
secret:
  data: {}
existingSecret: ""

vpa:
  enabled: false
