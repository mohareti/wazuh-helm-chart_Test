replicaCount: 3
autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
resources:
  requests:
    cpu: "500m"
    memory: "512Mi"
  limits:
    cpu: "2"
    memory: "2Gi"
ingress:
  hosts:
    - host: prod.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - hosts:
        - prod.example.com
      secretName: prod-tls
pdb:
  enabled: true
  minAvailable: 2
